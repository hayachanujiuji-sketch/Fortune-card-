<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>宇宙の運勢カード</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Noto+Serif+JP:wght@300;400;600&family=Philosopher:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root {
    --gold: #f0c040;
    --gold-light: #ffe484;
    --gold-dark: #b8860b;
    --cosmic-deep: #020818;
    --cosmic-mid: #0a1628;
    --cosmic-blue: #0d2147;
    --glass-bg: rgba(255,255,255,0.04);
    --glass-border: rgba(240,192,64,0.25);
    --text-main: #f5e6c8;
    --text-sub: #c9b07a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: var(--cosmic-deep);
    font-family: 'Noto Serif JP', serif;
    color: var(--text-main);
    overflow-x: hidden;
    position: relative;
  }

  /* ===== 星空背景 ===== */
  #starfield {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  .nebula {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.18;
    pointer-events: none;
    z-index: 0;
    animation: nebula-drift 20s ease-in-out infinite alternate;
  }
  .nebula-1 { width: 600px; height: 400px; background: radial-gradient(ellipse, #1a3a8f, transparent); top: -100px; left: -200px; }
  .nebula-2 { width: 500px; height: 500px; background: radial-gradient(ellipse, #3a0f5e, transparent); bottom: -100px; right: -150px; animation-delay: -10s; }
  .nebula-3 { width: 400px; height: 300px; background: radial-gradient(ellipse, #0f3a2e, transparent); top: 40%; left: 30%; animation-delay: -5s; }

  @keyframes nebula-drift {
    from { transform: translate(0,0) scale(1); }
    to   { transform: translate(30px, 20px) scale(1.08); }
  }

  /* ===== メインコンテナ ===== */
  .container {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 60px;
    gap: 40px;
  }

  /* ===== ヘッダー ===== */
  .header {
    text-align: center;
    animation: fade-down 1s ease forwards;
  }
  .header-label {
    font-family: 'Cinzel Decorative', serif;
    font-size: 0.65rem;
    letter-spacing: 0.5em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 12px;
    opacity: 0.8;
  }
  .header h1 {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.6rem, 5vw, 2.8rem);
    background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--gold-dark));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.3;
    text-shadow: none;
    filter: drop-shadow(0 0 20px rgba(240,192,64,0.4));
  }
  .header-sub {
    margin-top: 10px;
    font-size: 0.8rem;
    color: var(--text-sub);
    letter-spacing: 0.2em;
  }

  /* ===== 入力フォーム ===== */
  .form-card {
    width: 100%;
    max-width: 480px;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    padding: 36px 32px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 8px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.08);
    animation: fade-up 0.9s ease forwards;
  }

  .form-title {
    font-family: 'Philosopher', serif;
    font-size: 1rem;
    color: var(--gold);
    text-align: center;
    letter-spacing: 0.2em;
    margin-bottom: 28px;
    opacity: 0.9;
  }

  .form-group {
    margin-bottom: 20px;
  }
  .form-group label {
    display: block;
    font-size: 0.75rem;
    color: var(--text-sub);
    letter-spacing: 0.2em;
    margin-bottom: 8px;
  }
  .form-group input {
    width: 100%;
    padding: 13px 18px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(240,192,64,0.2);
    border-radius: 12px;
    color: var(--text-main);
    font-family: 'Noto Serif JP', serif;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .form-group input:focus {
    border-color: rgba(240,192,64,0.6);
    box-shadow: 0 0 0 3px rgba(240,192,64,0.1);
  }
  .form-group input[type="date"]::-webkit-calendar-picker-indicator {
    filter: invert(0.8) sepia(1) hue-rotate(10deg);
    cursor: pointer;
  }

  .submit-btn {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, #c9920a, var(--gold), #c9920a);
    border: none;
    border-radius: 14px;
    color: #1a0e00;
    font-family: 'Cinzel Decorative', serif;
    font-size: 0.9rem;
    letter-spacing: 0.15em;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(240,192,64,0.3);
    margin-top: 8px;
  }
  .submit-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(240,192,64,0.5);
  }
  .submit-btn:active { transform: translateY(0); }

  /* ===== 運勢カード ===== */
  #card-area {
    width: 100%;
    max-width: 480px;
    display: none;
    animation: card-appear 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
  }

  @keyframes card-appear {
    from { opacity: 0; transform: scale(0.85) translateY(30px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .fortune-card {
    background: linear-gradient(145deg, rgba(15,25,55,0.92), rgba(8,12,35,0.96));
    border: 1px solid rgba(240,192,64,0.35);
    border-radius: 28px;
    padding: 40px 32px 36px;
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    box-shadow:
      0 20px 60px rgba(0,0,0,0.6),
      0 0 0 1px rgba(255,255,255,0.04) inset,
      0 0 80px rgba(240,192,64,0.06) inset;
    position: relative;
    overflow: hidden;
  }

  /* カード内の装飾 */
  .fortune-card::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(240,192,64,0.08), transparent 70%);
    border-radius: 50%;
  }
  .fortune-card::after {
    content: '';
    position: absolute;
    bottom: -40px; left: -40px;
    width: 160px; height: 160px;
    background: radial-gradient(circle, rgba(80,120,255,0.07), transparent 70%);
    border-radius: 50%;
  }

  .card-top-label {
    font-family: 'Cinzel Decorative', serif;
    font-size: 0.55rem;
    letter-spacing: 0.5em;
    color: var(--gold);
    text-align: center;
    opacity: 0.7;
    margin-bottom: 20px;
  }

  .card-name {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.3rem, 4vw, 1.8rem);
    text-align: center;
    background: linear-gradient(135deg, var(--gold-light), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 12px rgba(240,192,64,0.5));
    margin-bottom: 6px;
  }

  .card-birth {
    text-align: center;
    font-size: 0.75rem;
    color: var(--text-sub);
    letter-spacing: 0.2em;
    margin-bottom: 24px;
  }

  /* 区切り線 */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 20px 0;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(240,192,64,0.3), transparent);
  }
  .divider-star {
    color: var(--gold);
    font-size: 1rem;
    animation: spin-slow 8s linear infinite;
  }
  @keyframes spin-slow {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  /* メインシンボル */
  .main-symbol {
    text-align: center;
    margin: 16px 0;
  }
  .symbol-icon {
    font-size: 3.5rem;
    line-height: 1;
    filter: drop-shadow(0 0 20px rgba(240,192,64,0.6));
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-8px); }
  }
  .symbol-title {
    font-family: 'Philosopher', serif;
    font-size: 1.4rem;
    color: var(--gold-light);
    margin-top: 8px;
    letter-spacing: 0.1em;
  }
  .symbol-sub {
    font-size: 0.72rem;
    color: var(--text-sub);
    letter-spacing: 0.15em;
    margin-top: 4px;
  }

  /* ステータスグリッド */
  .status-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin: 20px 0;
  }
  .status-item {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(240,192,64,0.15);
    border-radius: 14px;
    padding: 14px 12px;
    text-align: center;
  }
  .status-label {
    font-size: 0.6rem;
    color: var(--gold);
    letter-spacing: 0.25em;
    opacity: 0.8;
    margin-bottom: 6px;
  }
  .status-value {
    font-family: 'Philosopher', serif;
    font-size: 1rem;
    color: var(--text-main);
    line-height: 1.3;
  }
  .status-stars {
    font-size: 0.85rem;
    color: var(--gold);
    margin-top: 2px;
  }

  /* 運勢メッセージ */
  .fortune-message {
    background: rgba(240,192,64,0.05);
    border: 1px solid rgba(240,192,64,0.2);
    border-radius: 16px;
    padding: 20px 18px;
    margin: 16px 0;
  }
  .fortune-message-label {
    font-size: 0.6rem;
    color: var(--gold);
    letter-spacing: 0.3em;
    margin-bottom: 10px;
    opacity: 0.8;
  }
  .fortune-message-text {
    font-size: 0.9rem;
    line-height: 1.9;
    color: var(--text-main);
    font-weight: 300;
  }

  /* ラッキーアイテム */
  .lucky-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin: 16px 0;
  }
  .lucky-item {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(240,192,64,0.12);
    border-radius: 12px;
    padding: 12px 8px;
    text-align: center;
  }
  .lucky-icon { font-size: 1.4rem; }
  .lucky-label {
    font-size: 0.55rem;
    color: var(--gold);
    letter-spacing: 0.15em;
    margin-top: 4px;
    opacity: 0.7;
  }
  .lucky-value {
    font-size: 0.78rem;
    color: var(--text-main);
    margin-top: 3px;
  }

  /* 数秘術スコア */
  .numerology-bar {
    margin: 16px 0;
  }
  .num-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .num-label {
    font-size: 0.65rem;
    color: var(--text-sub);
    width: 70px;
    flex-shrink: 0;
    letter-spacing: 0.1em;
  }
  .num-track {
    flex: 1;
    height: 6px;
    background: rgba(255,255,255,0.08);
    border-radius: 3px;
    overflow: hidden;
  }
  .num-fill {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--gold-dark), var(--gold-light));
    transition: width 1.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    width: 0;
  }
  .num-val {
    font-size: 0.75rem;
    color: var(--gold);
    width: 20px;
    text-align: right;
    flex-shrink: 0;
  }

  .card-footer {
    text-align: center;
    margin-top: 24px;
    font-size: 0.6rem;
    color: rgba(201,176,122,0.4);
    letter-spacing: 0.3em;
  }

  /* ===== 追加占いセクション ===== */
  .oracle-section {
    margin: 14px 0;
    text-align: center;
  }
  .oracle-section-label {
    font-size: 0.6rem;
    color: var(--gold);
    letter-spacing: 0.3em;
    opacity: 0.8;
    margin-bottom: 14px;
  }
  .oracle-main-value {
    font-family: 'Philosopher', serif;
    font-size: 1.45rem;
    color: var(--gold-light);
    margin-bottom: 8px;
    letter-spacing: 0.05em;
  }
  .oracle-badge-row {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }
  .oracle-badge {
    display: inline-block;
    background: rgba(240,192,64,0.1);
    border: 1px solid rgba(240,192,64,0.3);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 0.72rem;
    color: var(--gold);
    letter-spacing: 0.1em;
  }
  .oracle-kanshi {
    font-family: 'Philosopher', serif;
    font-size: 2.8rem;
    color: var(--gold-light);
    letter-spacing: 0.3em;
    margin-bottom: 8px;
    filter: drop-shadow(0 0 12px rgba(240,192,64,0.4));
  }
  .oracle-name-num {
    font-family: 'Cinzel Decorative', serif;
    font-size: 2.4rem;
    color: var(--gold);
    margin-bottom: 8px;
    filter: drop-shadow(0 0 10px rgba(240,192,64,0.3));
  }
  .oracle-desc {
    font-size: 0.82rem;
    color: var(--text-main);
    line-height: 1.85;
    font-weight: 300;
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(240,192,64,0.08);
    border-radius: 10px;
    padding: 12px 14px;
    text-align: left;
  }

  /* 保存ボタン */
  .save-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    margin-top: 20px;
    padding: 14px;
    background: rgba(240,192,64,0.08);
    border: 1px solid rgba(240,192,64,0.35);
    border-radius: 14px;
    color: var(--gold);
    font-family: 'Noto Serif JP', serif;
    font-size: 0.85rem;
    letter-spacing: 0.15em;
    cursor: pointer;
    transition: all 0.3s;
  }
  .save-btn:hover {
    background: rgba(240,192,64,0.15);
    box-shadow: 0 0 20px rgba(240,192,64,0.2);
  }

  /* アニメーション */
  @keyframes fade-down {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fade-up {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ローディング */
  .loading-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(2,8,24,0.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }
  .loading-overlay.active { display: flex; }
  .loading-text {
    font-family: 'Cinzel Decorative', serif;
    font-size: 0.8rem;
    color: var(--gold);
    letter-spacing: 0.3em;
    animation: pulse 1.5s ease-in-out infinite;
  }
  .loading-stars {
    font-size: 2rem;
    animation: spin-slow 2s linear infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 0.5; }
    50%      { opacity: 1; }
  }

  @media (max-width: 400px) {
    .form-card { padding: 28px 20px; }
    .fortune-card { padding: 30px 20px 28px; }
    .status-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<!-- 星空 -->
<canvas id="starfield"></canvas>
<div class="nebula nebula-1"></div>
<div class="nebula nebula-2"></div>
<div class="nebula nebula-3"></div>

<!-- ローディング -->
<div class="loading-overlay" id="loading">
  <div class="loading-stars">✦</div>
  <div class="loading-text">星が語りかけています...</div>
</div>

<div class="container">

  <!-- ヘッダー -->
  <div class="header">
    <div class="header-label">∞ Cosmic Fortune Reading ∞</div>
    <h1>宇宙の運命鑑定</h1>
    <div class="header-sub">あなただけの星の導き</div>
  </div>

  <!-- 入力フォーム -->
  <div class="form-card">
    <div class="form-title">✦ 生命の情報を入力 ✦</div>
    <div class="form-group">
      <label>お名前</label>
      <input type="text" id="input-name" placeholder="例：山田 花子" maxlength="20">
    </div>
    <div class="form-group">
      <label>生年月日</label>
      <input type="date" id="input-birth">
    </div>
    <button class="submit-btn" onclick="generateFortune()">
      ✧ 運命を解読する ✧
    </button>
  </div>

  <!-- 運勢カード -->
  <div id="card-area">
    <div class="fortune-card" id="fortune-card">

      <div class="card-top-label">✦ YOUR COSMIC DESTINY CARD ✦</div>

      <div class="card-name" id="card-name"></div>
      <div class="card-birth" id="card-birth"></div>

      <div class="divider"><span class="divider-star">✦</span></div>

      <!-- メインシンボル -->
      <div class="main-symbol">
        <div class="symbol-icon" id="symbol-icon"></div>
        <div class="symbol-title" id="symbol-title"></div>
        <div class="symbol-sub" id="symbol-sub"></div>
      </div>

      <div class="divider"><span class="divider-star">✦</span></div>

      <!-- ステータス -->
      <div class="status-grid">
        <div class="status-item">
          <div class="status-label">誕生月の星座</div>
          <div class="status-value" id="stat-sign"></div>
        </div>
        <div class="status-item">
          <div class="status-label">生命数</div>
          <div class="status-value" id="stat-num"></div>
          <div class="status-stars" id="stat-num-stars"></div>
        </div>
        <div class="status-item">
          <div class="status-label">誕生曜日</div>
          <div class="status-value" id="stat-day"></div>
        </div>
        <div class="status-item">
          <div class="status-label">守護星</div>
          <div class="status-value" id="stat-planet"></div>
        </div>
      </div>

      <!-- 運勢メッセージ -->
      <div class="fortune-message">
        <div class="fortune-message-label">✦ 宇宙からのメッセージ ✦</div>
        <div class="fortune-message-text" id="fortune-message"></div>
      </div>

      <!-- 数秘術バー -->
      <div class="numerology-bar">
        <div class="num-row">
          <span class="num-label">愛と縁</span>
          <div class="num-track"><div class="num-fill" id="bar-love"></div></div>
          <span class="num-val" id="val-love"></span>
        </div>
        <div class="num-row">
          <span class="num-label">仕事運</span>
          <div class="num-track"><div class="num-fill" id="bar-work"></div></div>
          <span class="num-val" id="val-work"></span>
        </div>
        <div class="num-row">
          <span class="num-label">財運</span>
          <div class="num-track"><div class="num-fill" id="bar-money"></div></div>
          <span class="num-val" id="val-money"></span>
        </div>
        <div class="num-row">
          <span class="num-label">健康運</span>
          <div class="num-track"><div class="num-fill" id="bar-health"></div></div>
          <span class="num-val" id="val-health"></span>
        </div>
      </div>

      <!-- ラッキーアイテム -->
      <div class="lucky-grid">
        <div class="lucky-item">
          <div class="lucky-icon">🎨</div>
          <div class="lucky-label">ラッキーカラー</div>
          <div class="lucky-value" id="lucky-color"></div>
        </div>
        <div class="lucky-item">
          <div class="lucky-icon">💎</div>
          <div class="lucky-label">パワーストーン</div>
          <div class="lucky-value" id="lucky-stone"></div>
        </div>
        <div class="lucky-item">
          <div class="lucky-icon">🔢</div>
          <div class="lucky-label">ラッキーナンバー</div>
          <div class="lucky-value" id="lucky-number"></div>
        </div>
      </div>

      <div class="divider"><span class="divider-star">✦</span></div>

      <!-- 九星気学 -->
      <div class="oracle-section">
        <div class="oracle-section-label">✦ 九星気学 ✦</div>
        <div class="oracle-main-value" id="kyusei-star"></div>
        <div class="oracle-badge-row">
          <span class="oracle-badge" id="kyusei-element-badge"></span>
          <span class="oracle-badge" id="kyusei-dir-badge"></span>
        </div>
        <div class="oracle-desc" id="kyusei-desc"></div>
      </div>

      <div class="divider"><span class="divider-star">✦</span></div>

      <!-- 四柱推命 -->
      <div class="oracle-section">
        <div class="oracle-section-label">✦ 四柱推命 ✦</div>
        <div class="oracle-kanshi" id="shichu-kanshi"></div>

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

function initStars() {
  stars = [];
  for (let i = 0; i < 280; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.5 + 0.3,
      alpha: Math.random(),
      speed: Math.random() * 0.008 + 0.002,
      phase: Math.random() * Math.PI * 2
    });
  }
}

function drawStars(t) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (const s of stars) {
    const a = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(t * s.speed + s.phase));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,240,${a})`;
    ctx.fill();
  }
  requestAnimationFrame(drawStars);
}

function getNameFortune(name) {
  let sum = [...name].reduce((acc, ch) => acc + ch.charCodeAt(0), 0);
  while (sum > 9) sum = String(sum).split('').reduce((a, b) => a + parseInt(b), 0);
  const num = sum || 9;
  return { num, ...NAME_FORTUNE[num - 1] };
}

// ===== 数秘術 =====
function numerologyReduce(n) {
  while (n > 9 && n !== 11 && n !== 22) {
    n = String(n).split('').reduce((a, b) => a + parseInt(b), 0);
  }
  return n;
}

function calcLifeNumber(dateStr) {
  const digits = dateStr.replace(/-/g, '').split('').map(Number);
  return numerologyReduce(digits.reduce((a, b) => a + b, 0));
}

// ===== シード乱数 =====
function seededRand(seed) {
  let s = seed;
  return function() {
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    return (s >>> 0) / 0xffffffff;
  };
}

function nameToSeed(name) {
  return [...name].reduce((acc, c) => acc + c.charCodeAt(0), 0);
}

  const signs = [
    { name: '水瓶座 ♒', m: 1, d: 20 }, { name: '魚座 ♓', m: 2, d: 19 },
    { name: '牡羊座 ♈', m: 3, d: 21 }, { name: '牡牛座 ♉', m: 4, d: 20 },
    { name: '双子座 ♊', m: 5, d: 21 }, { name: '蟹座 ♋', m: 6, d: 21 },
    { name: '獅子座 ♌', m: 7, d: 23 }, { name: '乙女座 ♍', m: 8, d: 23 },
    { name: '天秤座 ♎', m: 9, d: 23 }, { name: '蠍座 ♏', m: 10, d: 23 },
    { name: '射手座 ♐', m: 11, d: 22 },
  ];
  for (const s of signs) {
    if (month === s.m && day >= s.d) return s.name;
    if (month === s.m + 1 && day < signs.find(x => x.m === s.m + 1)?.d) return s.name;
  }
  return '射手座 ♐';
}

// ===== 運勢生成 =====
function generateFortune() {
  const name = document.getElementById('input-name').value.trim();
  const birth = document.getElementById('input-birth').value;

  if (!name) { alert('お名前を入力してください'); return; }
  if (!birth) { alert('生年月日を入力してください'); return; }

  // ローディング
  document.getElementById('loading').classList.add('active');

  setTimeout(() => {
    const date = new Date(birth + 'T00:00:00');
    const year = date.getFullYear();
    const month = date.getMonth() + 1;
    const day = date.getDate();
    const weekDay = date.getDay();
    const lifeNum = calcLifeNumber(birth);

    // シード = 名前 + 生年月日の数値
    const seed = nameToSeed(name) + year * 10000 + month * 100 + day + weekDay * 1000 + lifeNum * 77;
    const rand = seededRand(seed);

    // シンボル
    const symIdx = Math.floor(rand() * SYMBOLS.length);
    const sym = SYMBOLS[symIdx];

    // スコア（seed依存）
    const base = (lifeNum / 9);
    const love   = Math.min(10, Math.max(1, Math.round((rand() * 5 + base * 5 + (month % 3)))));
    const work   = Math.min(10, Math.max(1, Math.round((rand() * 5 + base * 4 + (day % 4)))));
    const money  = Math.min(10, Math.max(1, Math.round((rand() * 5 + base * 3 + (weekDay % 3)))));
    const health = Math.min(10, Math.max(1, Math.round((rand() * 5 + base * 5 + (lifeNum % 3)))));

    const msgIdx = (Math.floor(rand() * MESSAGES.length));
    const colorIdx = Math.floor(rand() * COLORS.length);
    const stoneIdx = Math.floor(rand() * STONES.length);
    const luckyNum = (lifeNum * 7 + day * 3 + month * 11) % 99 + 1;

    // 星座
    const zodiac = getZodiac(month, day);
    const planet = DAY_PLANETS[weekDay];

    // 表示
    const weekDayLabel = DAYS[weekDay];
    const birthLabel = `${year}年${month}月${day}日 ${weekDayLabel}`;

    document.getElementById('card-name').textContent = name;
    document.getElementById('card-birth').textContent = birthLabel;
    document.getElementById('symbol-icon').textContent = sym.icon;
    document.getElementById('symbol-title').textContent = sym.title;
    document.getElementById('symbol-sub').textContent = sym.sub;
    document.getElementById('stat-sign').textContent = zodiac;

      document.getElementById(valId).textContent = val;
      setTimeout(() => {
        document.getElementById(id).style.width = (val / 10 * 100) + '%';
      }, 600);
    }

    setBar('bar-work', 'val-work', work);
    setBar('bar-money', 'val-money', money);
    setBar('bar-health', 'val-health', health);

    document.getElementById('lucky-color').textContent = COLORS[colorIdx];
    document.getElementById('lucky-stone').textContent = STONES[stoneIdx];
    document.getElementById('lucky-number').textContent = luckyNum;

    // 九星気学

    document.getElementById('kyusei-dir-badge').textContent = `吉方位：${kyusei.dir}`;
    document.getElementById('kyusei-desc').textContent = kyusei.desc;

    // 四柱推命

    document.getElementById('shichu-element-badge').textContent = `五行：${shichu.element}（${shichu.yomi}）`;

  tmp.font = `26px ${SERIF}`;
  const msgLines    = wrapText(tmp, message,    W - PAD*2 - 40);
  const kyuseiLines = wrapText(tmp, kyuseiDesc, W - PAD*2 - 40);
  const shichuLines = wrapText(tmp, shichuDesc, W - PAD*2 - 40);
  const nameLines   = wrapText(tmp, nameDesc,   W - PAD*2 - 40);
  const msgBoxH     = msgLines.length    * 42 + 70;
  const kyuseiBoxH  = kyuseiLines.length * 42 + 70;
  const shichuBoxH  = shichuLines.length * 42 + 70;
  const nameBoxH    = nameLines.length   * 42 + 70;

  // ── 全体の高さを確定 ──
  const H = 60
    + 36              // TOP LABEL
    + 64              // name
    + 40              // birth
    + 50              // divider
    + 100             // symbol icon
    + 54              // symbol title
    + 36              // symbol sub
    + 50              // divider
    + 110*2 + 16 + 30 // status grid
    + msgBoxH + 28    // message
    + 44*4 + 24       // score bars
    + 140 + 28        // lucky grid
    // 九星気学
    + 50 + 36 + 50 + 50 + kyuseiBoxH + 20
    // 四柱推命
    + 50 + 36 + 70 + 50 + shichuBoxH + 20
    // 名前占い
    + 50 + 36 + 70 + 50 + nameBoxH + 20
    + 60;             // footer

  const cvs = document.createElement('canvas');
  cvs.width  = W;
  cvs.height = H;
  const ctx  = cvs.getContext('2d');
  let y = 0;

  // ── 背景 ──
  ctx.save();
  rr(ctx, 0, 0, W, H, 28); ctx.clip();
  const bg = ctx.createLinearGradient(0, 0, W, H);
  bg.addColorStop(0, '#0f1937');
  bg.addColorStop(1, '#08080c');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);
  ctx.restore();
  ctx.strokeStyle = 'rgba(240,192,64,0.35)'; ctx.lineWidth = 2;
  rr(ctx, 1, 1, W-2, H-2, 28); ctx.stroke();

  // ── TOP LABEL ──
  y = 56;
  ctx.textAlign = 'center';
  ctx.font = `18px ${SERIF}`;
  ctx.fillStyle = 'rgba(240,192,64,0.7)';
  ctx.fillText('✦  YOUR COSMIC DESTINY CARD  ✦', W/2, y);

  // ── NAME ──
  y += 56;
  ctx.font = `bold 52px ${SERIF}`;
  ctx.fillStyle = '#ffe484';
  ctx.fillText(name, W/2, y);

  // ── BIRTH ──
  y += 38;
  ctx.font = `24px ${SERIF}`;
  ctx.fillStyle = '#c9b07a';
  ctx.fillText(birth, W/2, y);

  // ── DIVIDER ──
  y += 40; drawDivider(ctx, W, y, SERIF); y += 16;

  // ── SYMBOL ──
  y += 10;
  ctx.font = '72px serif';
  ctx.fillText(symIcon, W/2, y + 66);
  y += 90;
  ctx.font = `bold 38px ${SERIF}`;
  ctx.fillStyle = '#ffe484';
  ctx.fillText(symTitle, W/2, y + 36);
  y += 46;
  ctx.font = `22px ${SERIF}`;
  ctx.fillStyle = '#c9b07a';
  ctx.fillText(symSub, W/2, y + 18);
  y += 34;

  // ── DIVIDER ──
  y += 16; drawDivider(ctx, W, y, SERIF); y += 28;

  // ── STATUS GRID ──
  const GW = (W - PAD*2 - 20) / 2, GH = 110;
  const gridItems = [
    { label: '誕生月の星座', val: statSign },
    { label: '生命数',       val: statNum,    sub: statStars },
    { label: '誕生曜日',     val: statDay },
    { label: '守護星',       val: statPlanet },
  ];
  gridItems.forEach((it, i) => {
    const gx = PAD + (i % 2) * (GW + 20);
    const gy = y  + Math.floor(i / 2) * (GH + 16);
    ctx.fillStyle = 'rgba(255,255,255,0.04)';
    rr(ctx, gx, gy, GW, GH, 14); ctx.fill();
    ctx.strokeStyle = 'rgba(240,192,64,0.15)'; ctx.lineWidth = 1;
    rr(ctx, gx, gy, GW, GH, 14); ctx.stroke();
    ctx.textAlign = 'center';
    ctx.font = `18px ${SERIF}`; ctx.fillStyle = 'rgba(240,192,64,0.8)';
    ctx.fillText(it.label, gx + GW/2, gy + 30);
    ctx.font = `bold 30px ${SERIF}`; ctx.fillStyle = '#f5e6c8';
    ctx.fillText(it.val, gx + GW/2, gy + 68);
    if (it.sub) {
      ctx.font = `22px ${SERIF}`; ctx.fillStyle = '#f0c040';
      ctx.fillText(it.sub, gx + GW/2, gy + 96);
    }
  });
  y += 2 * (GH + 16) + 16;

  // ── MESSAGE BOX ──
  ctx.fillStyle = 'rgba(240,192,64,0.05)';
  rr(ctx, PAD, y, W - PAD*2, msgBoxH, 16); ctx.fill();
  ctx.strokeStyle = 'rgba(240,192,64,0.2)'; ctx.lineWidth = 1;
  rr(ctx, PAD, y, W - PAD*2, msgBoxH, 16); ctx.stroke();
  ctx.textAlign = 'center';
  ctx.font = `18px ${SERIF}`; ctx.fillStyle = 'rgba(240,192,64,0.8)';
  ctx.fillText('✦  宇宙からのメッセージ  ✦', W/2, y + 28);
  ctx.textAlign = 'left';
  ctx.font = `26px ${SERIF}`; ctx.fillStyle = '#f5e6c8';
  msgLines.forEach((line, i) => ctx.fillText(line, PAD + 20, y + 64 + i * 42));
  y += msgBoxH + 24;

  // ── SCORE BARS ──
  const BX = PAD + 84, BW = W - PAD*2 - 84 - 36;
  [['愛と縁', valLove], ['仕事運', valWork], ['財運', valMoney], ['健康運', valHealth]].forEach(([label, val]) => {
    ctx.textAlign = 'left';
    ctx.font = `24px ${SERIF}`; ctx.fillStyle = '#c9b07a';
    ctx.fillText(label, PAD, y + 22);
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    rr(ctx, BX, y + 8, BW, 14, 7); ctx.fill();
    const fg = ctx.createLinearGradient(BX, 0, BX + BW, 0);
    fg.addColorStop(0, '#b8860b'); fg.addColorStop(1, '#ffe484');
    ctx.fillStyle = fg;
    rr(ctx, BX, y + 8, BW * val / 10, 14, 7); ctx.fill();
    ctx.textAlign = 'right';
    ctx.font = `bold 24px ${SERIF}`; ctx.fillStyle = '#f0c040';
    ctx.fillText(val, W - PAD, y + 22);
    y += 44;
  });
  y += 20;

  // ── LUCKY GRID ──
  const LW = (W - PAD*2 - 20) / 3, LH = 130;
  [['🎨','ラッキーカラー', lColor], ['💎','パワーストーン', lStone], ['🔢','ラッキーナンバー', lNumber]].forEach(([icon, label, val], i) => {
    const lx = PAD + i * (LW + 10);
    ctx.fillStyle = 'rgba(255,255,255,0.03)';
    rr(ctx, lx, y, LW, LH, 12); ctx.fill();
    ctx.strokeStyle = 'rgba(240,192,64,0.12)'; ctx.lineWidth = 1;
    rr(ctx, lx, y, LW, LH, 12); ctx.stroke();
    ctx.textAlign = 'center';
    ctx.font = '34px serif'; ctx.fillStyle = '#fff';
    ctx.fillText(icon, lx + LW/2, y + 44);
    ctx.font = `16px ${SERIF}`; ctx.fillStyle = 'rgba(240,192,64,0.7)';
    ctx.fillText(label, lx + LW/2, y + 72);
    ctx.font = `bold 22px ${SERIF}`; ctx.fillStyle = '#f5e6c8';
    ctx.fillText(val, lx + LW/2, y + 104);
  });
  y += LH + 24;

  // ── オラクルセクション描画ヘルパー ──
  function drawOracleSection(title, mainVal, badges, descLines, descBoxH, isKanshi) {
    // divider
    y += 14; drawDivider(ctx, W, y, SERIF); y += 28;
    // title
    ctx.textAlign = 'center';
    ctx.font = `18px ${SERIF}`; ctx.fillStyle = 'rgba(240,192,64,0.8)';
    ctx.fillText(title, W/2, y + 18); y += 34;
    // main value
    if (isKanshi) {
      ctx.font = `bold 64px ${SERIF}`; ctx.fillStyle = '#ffe484';
      ctx.fillText(mainVal, W/2, y + 56); y += 68;
    } else {
      ctx.font = `bold 42px ${SERIF}`; ctx.fillStyle = '#ffe484';
      ctx.fillText(mainVal, W/2, y + 42); y += 52;
    }
    // badges
    const badgeFont = `20px ${SERIF}`;
    ctx.font = badgeFont;
    const totalBW = badges.reduce((s, b) => s + ctx.measureText(b).width + 32, 0) + (badges.length-1)*12;
    let bx = W/2 - totalBW/2;
    badges.forEach(badge => {
      const bw = ctx.measureText(badge).width + 32;
      ctx.fillStyle = 'rgba(240,192,64,0.1)';
      rr(ctx, bx, y, bw, 32, 16); ctx.fill();
      ctx.strokeStyle = 'rgba(240,192,64,0.3)'; ctx.lineWidth = 1;
      rr(ctx, bx, y, bw, 32, 16); ctx.stroke();
      ctx.fillStyle = '#f0c040'; ctx.textAlign = 'left';
      ctx.fillText(badge, bx + 16, y + 22);
      bx += bw + 12;
    });
    y += 44;
    // desc box
    ctx.fillStyle = 'rgba(255,255,255,0.02)';
    rr(ctx, PAD, y, W-PAD*2, descBoxH, 10); ctx.fill();
    ctx.strokeStyle = 'rgba(240,192,64,0.08)'; ctx.lineWidth = 1;
    rr(ctx, PAD, y, W-PAD*2, descBoxH, 10); ctx.stroke();
    ctx.textAlign = 'left';
    ctx.font = `26px ${SERIF}`; ctx.fillStyle = '#f5e6c8';
    descLines.forEach((line, i) => ctx.fillText(line, PAD+20, y + 46 + i*42));
    y += descBoxH + 18;
  }

  drawOracleSection('✦  九星気学  ✦', kyuseiStar, [kyuseiEl, kyuseiDir], kyuseiLines, kyuseiBoxH, false);
  drawOracleSection('✦  四柱推命  ✦', shichuKan,  [shichuEl, shichuPil],  shichuLines, shichuBoxH, true);
  drawOracleSection('✦  名前占い  ✦', nameNum,    [nameBadge],             nameLines,   nameBoxH,   false);

  // ── FOOTER ──
  y += 10;
  ctx.textAlign = 'center';
  ctx.font = `18px ${SERIF}`; ctx.fillStyle = 'rgba(201,176,122,0.4)';
  ctx.fillText('✦  COSMIC DESTINY ORACLE  ✦', W/2, y + 20);

  showSaveModal(cvs.toDataURL('image/png'), name);
}

// テキスト折り返し
function wrapText(ctx, text, maxW) {
  const lines = [];
  let line = '';
  for (const ch of [...text]) {
    const test = line + ch;
    if (ctx.measureText(test).width > maxW && line) { lines.push(line); line = ch; }
    else line = test;
  }
  if (line) lines.push(line);
  return lines;
}

// 区切り線
function drawDivider(ctx, W, y, serif) {
  const g = ctx.createLinearGradient(60, 0, W-60, 0);
  g.addColorStop(0, 'transparent');
  g.addColorStop(0.5, 'rgba(240,192,64,0.3)');
  g.addColorStop(1, 'transparent');
  ctx.strokeStyle = g; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(60, y); ctx.lineTo(W-60, y); ctx.stroke();
  ctx.textAlign = 'center';
  ctx.font = `20px ${serif}`; ctx.fillStyle = '#f0c040';
  ctx.fillText('✦', W/2, y + 8);
}

// 角丸パス
function rr(ctx, x, y, w, h, r) {
  ctx.beginPath(); ctx.roundRect(x, y, w, h, r);
}

function showSaveModal(dataUrl, name) {
  const isIOS = /iP(ad|hone|od)/.test(navigator.userAgent);

  const modal = document.createElement('div');
  modal.style.cssText = [
    'position:fixed', 'inset:0', 'z-index:200',
    'background:rgba(2,8,24,0.93)',
    'display:flex', 'flex-direction:column',
    'align-items:center', 'justify-content:center',
    'padding:24px', 'gap:18px', 'overflow-y:auto'
  ].join(';');

  const msg = document.createElement('p');
  msg.style.cssText = 'color:#f0c040;font-size:0.9rem;letter-spacing:0.1em;text-align:center;line-height:1.7;';
  msg.innerHTML = isIOS
    ? '画像を<strong>長押し</strong>して<br>「写真に保存」を選んでね ✨'
    : '右クリック→「名前を付けて保存」<br>またはボタンでダウンロード ✨';

  const img = document.createElement('img');
  img.src = dataUrl;
  img.style.cssText = 'max-width:100%;max-height:65vh;border-radius:16px;display:block;box-shadow:0 8px 40px rgba(0,0,0,0.6);';

  const btnRow = document.createElement('div');
  btnRow.style.cssText = 'display:flex;gap:12px;flex-wrap:wrap;justify-content:center;';

  if (!isIOS) {
    const dlBtn = document.createElement('a');
    dlBtn.download = `運勢カード_${name}.png`;
    dlBtn.href = dataUrl;
    dlBtn.textContent = '💾 ダウンロード';
    dlBtn.style.cssText = [
      'padding:12px 28px',
      'background:linear-gradient(135deg,#c9920a,#f0c040,#c9920a)',
      'border-radius:12px',
      'color:#1a0e00',
      'font-size:0.9rem',
      'font-weight:bold',
      'text-decoration:none',
      'letter-spacing:0.1em'
    ].join(';');
    btnRow.appendChild(dlBtn);
  }

  const closeBtn = document.createElement('button');
  closeBtn.textContent = '✕ 閉じる';
  closeBtn.style.cssText = [
    'padding:12px 28px',
    'background:transparent',
    'border:1px solid rgba(255,255,255,0.25)',
    'border-radius:12px',
    'color:rgba(255,255,255,0.6)',
    'font-size:0.9rem',
    'cursor:pointer'
  ].join(';');
  closeBtn.onclick = () => document.body.removeChild(modal);

  btnRow.appendChild(closeBtn);
  modal.appendChild(msg);
  modal.appendChild(img);
  modal.appendChild(btnRow);
  document.body.appendChild(modal);
}

// Enter キーで実行
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') generateFortune();
});
</script>
